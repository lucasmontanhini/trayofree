<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital - TrayoFREE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            padding: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
            animation: fadeIn 0.8s ease-in;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #ff6600;
            margin-bottom: 5px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .header p {
            font-size: 1rem;
            color: #ccc;
        }

        .categorias-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            flex: 1;
            overflow-y: auto;
        }
        
        .categorias-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .categorias-container::-webkit-scrollbar-track {
            background: rgba(255, 102, 0, 0.05);
        }
        
        .categorias-container::-webkit-scrollbar-thumb {
            background: #ff6600;
            border-radius: 10px;
        }

        .categoria-section {
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0;
            animation: slideIn 0.6s ease-out;
            flex: none;
            min-width: auto;
            display: block;
            overflow: visible;
        }

        .categoria-title {
            font-size: 0.9rem;
            color: #ff6600;
            margin-bottom: 8px;
            border-bottom: none;
            border-top: 2px solid #ff6600;
            padding-top: 8px;
            padding-bottom: 0;
            text-shadow: none;
            flex-shrink: 0;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .produtos-lista {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            overflow-y: visible;
            padding-right: 0;
        }
        
        .produtos-lista::-webkit-scrollbar {
            width: 4px;
        }
        
        .produtos-lista::-webkit-scrollbar-track {
            background: rgba(255, 102, 0, 0.1);
            border-radius: 10px;
        }
        
        .produtos-lista::-webkit-scrollbar-thumb {
            background: #ff6600;
            border-radius: 10px;
        }

        .produto-card {
            background: rgba(30, 30, 30, 0.7);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 7px;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: auto;
            flex-shrink: 0;
        }

        .produto-card:hover {
            border-color: #ff6600;
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.3);
            transform: translateY(-5px);
        }

        .produto-nome {
            font-size: 0.95rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 2px;
        }

        .produto-descricao {
            font-size: 0.7rem;
            color: #999;
            margin-bottom: 4px;
            line-height: 1;
            font-style: italic;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .produto-preco {
            font-size: 1rem;
            color: #ff6600;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .vazio-msg {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            font-size: 2rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 800px) {
            .header h1 { font-size: 1.8rem; }
            .categoria-title { font-size: 0.8rem; }
            .produto-nome { font-size: 0.9rem; }
            .produto-descricao { font-size: 0.7rem; }
            .produto-preco { font-size: 1rem; }
            .categorias-container { grid-template-columns: repeat(2, 1fr); }
        }

        .loading {
            text-align: center;
            font-size: 2rem;
            color: #ff6600;
            padding: 100px 20px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Auto-refresh indicator */
        .refresh-indicator {
            display: none;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Cardápio Digital</h1>
        <p>Confira nossos pratos deliciosos</p>
    </div>

    <div id="conteudo">
        <div class="loading">Carregando cardápio...</div>
    </div>

    <div class="refresh-indicator">🔄</div>

    <script>
        const API_URL = `http://${window.location.hostname}:3000/api`;

        async function getDB(k) {
            try {
                const r = await fetch(`${API_URL}/${k}`, { cache: 'no-store' });
                return await r.json();
            } catch (e) {
                console.error(`Erro ao carregar ${k}:`, e);
                return [];
            }
        }

        async function carregarCardapio() {
            const conteudo = document.getElementById('conteudo');
            const cat = await getDB('catalogo');

            if (!cat || cat.length === 0) {
                conteudo.innerHTML = '<div class="vazio-msg">Nenhum produto cadastrado no cardápio.</div>';
                return;
            }

            // Filtrar apenas produtos disponíveis
            const disponiveis = cat.filter(p => !p.indisponivel);

            if (disponiveis.length === 0) {
                conteudo.innerHTML = '<div class="vazio-msg">Todos os produtos estão indisponíveis no momento.</div>';
                return;
            }

            // Agrupar por categoria
            const categorias = {};
            disponiveis.forEach(produto => {
                if (!categorias[produto.categoria]) {
                    categorias[produto.categoria] = [];
                }
                categorias[produto.categoria].push(produto);
            });

            // Ordem das categorias
            const ordem = ['Bebidas', 'Lanches', 'Porções', 'Sobremesas'];
            let html = '<div class="categorias-container">';

            ordem.forEach(cat_nome => {
                if (categorias[cat_nome]) {
                    html += `<div class="categoria-section">
                        <div class="categoria-title">${cat_nome}</div>
                        <div class="produtos-lista">`;

                    categorias[cat_nome].forEach(prod => {
                        const descricao = prod.descricao || 'Produto delicioso sem descrição disponível.';
                        html += `
                            <div class="produto-card">
                                <div>
                                    <div class="produto-nome">${prod.nome}</div>
                                    <div class="produto-descricao">${descricao}</div>
                                </div>
                                <div class="produto-preco">
                                    <span></span>
                                    <span>R$ ${parseFloat(prod.preco).toFixed(2)}</span>
                                </div>
                            </div>`;
                    });

                    html += '</div></div>';
                }
            });

            html += '</div>';
            conteudo.innerHTML = html;
        }

        // Carregar ao iniciar
        window.addEventListener('load', carregarCardapio);

        // Atualizar a cada 10 segundos (para refletir mudanças de disponibilidade)
        setInterval(carregarCardapio, 10000);
    </script>
</body>
</html>
