<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrayoFREE - Cozinha</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://use.typekit.net/aab5ush.css">
    <style>
        /* AJUSTES EXCLUSIVOS PARA O MONITOR DA COZINHA */
        body { background: #050505; padding: 25px; margin: 0; }
        
        .kitchen-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--primary-orange);
            padding-bottom: 20px; margin-bottom: 30px;
        }

        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 25px;
        }

        .kitchen-card {
            background: #111;
            border: 2px solid #222;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 350px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: border-color 0.3s ease;
        }

        .kitchen-card.nao-lido {
            border: 3px solid #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        .kitchen-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #222;
        }

        .alerta-nao-lido {
            background: #ff0000;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            animation: piscar-alerta 1s infinite;
            margin-bottom: 10px;
        }

        @keyframes piscar-alerta {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-preparacao {
            background: #ff9800;
            color: #000;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .mesa-destaque {
            background: var(--primary-orange);
            color: #000;
            font-size: 2.2rem;
            font-weight: 900;
            padding: 8px 20px;
            border-radius: 8px;
        }

        .garcom-info {
            text-align: right;
            color: #aaa;
            font-size: 1.1rem;
        }

        .itens-lista {
            font-size: 1.8rem;
            color: var(--primary-orange);
            font-weight: bold;
            line-height: 1.3;
            margin-bottom: 20px;
            white-space: pre-wrap;
            flex-grow: 1;
        }

        .obs-cozinha {
            background: #410000;
            color: #ff5555;
            border: 2px solid #ff0000;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.3rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .btn-cozinha-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-print {
            background: #222;
            width: 80px;
            height: 80px;
            font-size: 30px;
        }

        .btn-concluir {
            flex: 1;
            background: var(--green-btn) !important;
            height: 80px;
            font-size: 1.8rem;
            min-width: 150px;
        }

        .btn-receber {
            flex: 1;
            background: #dc3545 !important;
            height: 80px;
            font-size: 1.8rem;
            min-width: 150px;
        }

        .btn-pronto {
            flex: 1;
            background: #ffc107 !important;
            height: 80px;
            font-size: 1.8rem;
            min-width: 150px;
            color: #000 !important;
            font-weight: bold;
        }

        /* Animação para novos pedidos */
        @keyframes piscar {
            0% { border-color: #222; }
            50% { border-color: var(--primary-orange); }
            100% { border-color: #222; }
        }
        .novo-pedido { animation: piscar 2s infinite; }
    </style>
</head>
<body>

<button onclick="window.location.href='index.html'" 
        style="position: fixed; top: 10px; left: 10px; background: rgba(255,255,255,0.1); color: #fff; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; z-index: 1000; font-size: 10px;">
    ← SAIR DO MONITOR
</button>

    <div class="content-kitchen">
        <header class="kitchen-header">
            <div>
                <h1 style="font-size: 2.8rem; margin:0;">MONITOR DE PREPARO</h1>
                <p style="color: #666; font-size: 1.2rem; margin:5px 0 0 0;">Pedidos em tempo real</p>
            </div>
            <img src="images/Ativo 7@4x-8.png" style="width: 180px;">
        </header>

        <div id="gridCozinha" class="orders-grid">
            <!-- Cards de pedidos serão injetados aqui -->
        </div>
    </div>

    <script src="script.js"></script>
    <script>
       
       async function renderizarMonitorCozinha() {
    const container = document.getElementById('gridCozinha');
    if (!container) return;

    try {
        const peds = await getDB('pedidos');
    // Cozinha SÓ vê o que chegou agora ou o que já está no fogo.
    // Pedidos que o garçom já levou (pronto/entregue/pagamento) NÃO aparecem aqui.
    const emPreparo = peds.filter(p => p.status === 'preparando' || p.status === 'em_preparacao');

        console.log('🔍 DEBUG COZINHA:', { totalPedidos: peds.length, emPreparo: emPreparo.length, pedidos: peds.map(p => ({id: p.id, status: p.status})) });

        if (emPreparo.length === 0) {
            container.innerHTML = `<h2 style="grid-column:1/-1; color:#222; text-align:center; font-size:3rem; margin-top:100px;">Nenhum pedido no momento</h2>`;
            return;
        }

        // Mapeia e injeta os cards limpando o conteúdo anterior
        container.innerHTML = emPreparo.map(p => {
            const isRecebido = p.status === 'em_preparacao';
            console.log('📋 Renderizando card:', {id: p.id, status: p.status, isRecebido});
            
            return `
            <div class="kitchen-card ${p.status === 'preparando' ? 'nao-lido' : ''}">
                ${p.status === 'preparando' ? '<div class="alerta-nao-lido">⚠️ PEDIDO NÃO LIDO</div>' : ''}
                ${isRecebido ? '<div class="status-preparacao">🍳 EM PREPARAÇÃO</div>' : ''}
                
                <div class="kitchen-card-header">
                    <span class="mesa-destaque">MESA ${p.mesa}</span>
                    <div class="garcom-info">
                        <b style="color:#fff;">👤 ${p.garcom || 'Admin'}</b><br>
                        <span>#${p.id} | ${p.hora}</span>
                    </div>
                </div>
                
                <div class="itens-lista">${p.itens}</div>
                
                ${p.obs ? `<div class="obs-cozinha">⚠️ ${p.obs}</div>` : ''}
                
                <div class="btn-cozinha-container">
                    <button class="btn" style="background:#222; width:70px; font-size:25px;" onclick="deletarPedido('${p.id}')">🗑️</button>
                    ${p.status === 'preparando' ? `
                        <button class="btn btn-receber" onclick="receberPedidoCozinha('${p.id}')">RECEBER PEDIDO</button>
                    ` : `
                        <button class="btn btn-pronto" onclick="marcarProntoCozinha('${p.id}')">PEDIDO PRONTO</button>
                    `}
                </div>
            </div>
            `;
        }).join('');

    } catch (err) { console.error('❌ Erro na cozinha:', err); }
}

       async function receberPedidoCozinha(id) {
    console.log("LOG: Clicou em receber pedido " + id);
    try {
        const peds = await getDB('pedidos');
        const idx = peds.findIndex(p => p.id.toString() === id.toString());
        
        if (idx !== -1) {
            const pedido = peds[idx];
            
            // 1. Atualiza o status no banco de dados
            peds[idx].status = 'em_preparacao';
            await saveDB('pedidos', peds);
            
            // 2. CHAMA A IMPRESSÃO (Função que está no script.js)
            if (window.imprimirReciboCozinha) {
                window.imprimirReciboCozinha(pedido);
            } else {
                console.error("ERRO: Função imprimirReciboCozinha não encontrada!");
            }

            // 3. Atualiza a tela da cozinha
            renderizarMonitorCozinha();
        }
    } catch (err) {
        console.error("Erro ao processar recebimento:", err);
    }
}

        function gerarTextoRecibo(pedido) {
            const agora = new Date();
            const data = agora.toLocaleDateString('pt-BR');
            const hora = agora.toLocaleTimeString('pt-BR');
            
            const linhaTracejada = '================================';
            
            let texto = `
${linhaTracejada}
        RECIBO DE PEDIDO - COZINHA
${linhaTracejada}

DATA: ${data}
HORA: ${hora}

MESA: ${pedido.mesa}
PEDIDO #: ${pedido.id}
GARÇOM: ${pedido.garcom || 'Admin'}

${linhaTracejada}
ITENS:
${linhaTracejada}
${pedido.itens}

${linhaTracejada}
OBSERVAÇÕES:
${pedido.obs || '(Nenhuma)'}

${linhaTracejada}
STATUS: EM PREPARAÇÃO
${linhaTracejada}

TOTAL: R$ ${parseFloat(pedido.total).toFixed(2)}

${linhaTracejada}
`;
            return texto.trim();
        }

        async function marcarProntoCozinha(id) {
            try {
                // Buscar o pedido
                const peds = await getDB('pedidos');
                const idx = peds.findIndex(p => p.id.toString() === id.toString());
                if (idx === -1) return;

                const pedido = peds[idx];

                // Mudar status para "pronto"
                peds[idx].status = 'pronto';
                await saveDB('pedidos', peds);

                // ✅ NOTIFICAR GARÇOM AQUI
                console.log(`🔔 GARÇOM NOTIFICADO! Prato da MESA ${pedido.mesa} (Pedido #${pedido.id}) está PRONTO!`);
                
                // Aqui você pode adicionar:
                // - Som de notificação
                // - Mensagem visual/toast
                // - Enviar para app do garçom
                // - Lighting effect
                
                // Atualizar interface
                renderizarMonitorCozinha();
                
            } catch (err) {
                console.error('Erro ao marcar como pronto:', err);
            }
        }

        // Inicialização
        window.onload = () => {
            renderizarMonitorCozinha();
            // Atualização Automática a cada 5 segundos
            setInterval(renderizarMonitorCozinha, 5000);
        };
    </script>
</body>
</html>
